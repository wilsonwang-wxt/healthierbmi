<div class="visualizer-container">
    <p class="bmi-text">BMI Progress: <span id="oldBMIText">0</span> → <strong id="newBMIText">0</strong></p>
    
    <!-- Legend -->
    <div class="bmi-legend">
        <div class="legend-item"><span class="dot underweight"></span> Underweight</div>
        <div class="legend-item"><span class="dot healthy"></span> Healthy</div>
        <div class="legend-item"><span class="dot overweight"></span> Overweight</div>
        <div class="legend-item"><span class="dot obese"></span> Obese</div>
    </div>

    <!-- The Actual Scale Area -->
    <div class="scale-area">
        <!-- Old Marker (Above) -->
        <div id="marker-old" class="marker old-marker">
            Old<br><span>▼</span>
        </div>

        <!-- The Colored Bar -->
        <div class="bmi-bar">
            <div class="seg underweight"></div>
            <div class="seg healthy"></div>
            <div class="seg overweight"></div>
            <div class="seg obese"></div>
        </div>

        <!-- New Marker (Below) -->
        <div id="marker-new" class="marker new-marker">
            <span>▲</span><br>New
        </div>

        <!-- Scale Labels -->
        <div class="scale-numbers">
            <span>15</span>
            <span>18.5</span>
            <span>25</span>
            <span>30</span>
            <span>40</span>
        </div>
    </div>
</div>
