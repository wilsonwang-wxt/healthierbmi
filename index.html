<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Active Travel BMI Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Active Travel BMI Calculator</h1>
    <p class="subtitle">See how your commute impacts your health over a month.</p>
    
    <form id="calculatorForm">
      <div class="grid">
        <label>Weight (kg): <input type="number" id="weight" placeholder="70" required></label>
        <label>Height (cm): <input type="number" id="height" placeholder="170" required></label>
      </div>

      <label>Commute Mode:
        <select id="activity">
          <option value="3.5">Walking (Brisk)</option>
          <option value="6.8">Cycling (Moderate)</option>
          <option value="3.0">E-Bike</option>
          <option value="1.5">Public Transport (Mixed)</option>
        </select>
      </label>

      <label>Daily Duration (mins, one way): <input type="number" id="duration" placeholder="20" required></label>
      <label>Days per week: <input type="number" id="days" value="5" required></label>

      <button type="submit">Project Monthly Results</button>
    </form>

    <div id="results" class="hidden">
      <div class="result-card">
        <h3>Monthly Projection</h3>
        <p>Extra Calories Burned: <span id="calOut">0</span> kcal</p>
        <p>Estimated Weight Loss: <span id="weightOut">0</span> kg</p>
        <div class="bmi-comparison">
          <div>Initial BMI: <strong id="oldBMI">0</strong></div>
          <div>New BMI: <strong id="newBMI" class="highlight">0</strong></div>
        </div>
        <div class="progress-container">
          <div id="bmiBar" class="progress-bar"></div>
        </div>
        <p id="insight" class="insight-text"></p>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
